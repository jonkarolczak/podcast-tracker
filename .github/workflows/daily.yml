name: Daily Podcast Digest

on:
  schedule:
    # Dual cron entries + in-script idempotency guard handle DST cleanly.
    # 11:05 UTC = 6:05am CDT (summer); 12:05 UTC = 6:05am CST (winter).
    # :05 past the hour avoids the top-of-hour GHA congestion spike.
    - cron: "5 11 * * *"
    - cron: "5 12 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback hours (default 26)"
        required: false
        default: "26"
      skip_idempotency_guard:
        description: "Re-run even if today's date is already in last_run.txt"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-podcast-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      WHISPER_MODEL: base.en
      OMP_NUM_THREADS: "4"
      HF_HUB_DISABLE_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache faster-whisper model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-${{ env.WHISPER_MODEL }}-ct2-v1
          restore-keys: |
            whisper-${{ env.WHISPER_MODEL }}-
            whisper-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # yt-dlp ships frequent YouTube extractor fixes; always use latest
          pip install -U yt-dlp

      - name: Pre-warm Whisper model
        run: |
          python -c "from faster_whisper import WhisperModel; WhisperModel('${{ env.WHISPER_MODEL }}', device='cpu', compute_type='int8')"

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
          PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          set -euo pipefail
          LOOKBACK="${{ github.event.inputs.lookback_hours || '26' }}"
          SKIP_GUARD_FLAG=""
          if [[ "${{ github.event.inputs.skip_idempotency_guard }}" == "true" ]]; then
            SKIP_GUARD_FLAG="--skip-idempotency-guard"
          fi
          python -m src.tracker daily --lookback-hours "$LOOKBACK" $SKIP_GUARD_FLAG

      - name: Commit state
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "state: daily run ${{ github.run_id }}"
          file_pattern: "state/seen_episodes.json state/last_run.txt"
          commit_user_name: "podcast-tracker-bot"
          commit_user_email: "podcast-tracker-bot@users.noreply.github.com"
